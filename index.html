<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohamed Habish Official | Pi Music Network</title>
    
    <!-- Pi Network SDK -->
    <script src="https://sdk.minepi.com/pi-dist.js"></script>
    
    <!-- YouTube IFrame Player API -->
    <script src="https://www.youtube.com/iframe_api"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: #0b0a12;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: linear-gradient(145deg, #13111c, #1a1829);
            width: 100%;
            max-width: 450px;
            border-radius: 24px;
            padding: 35px 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
        }

        .artist-profile {
            margin-bottom: 30px;
        }

        .music-icon-container {
            width: 90px;
            height: 90px;
            background: rgba(255, 204, 0, 0.1);
            border: 2px dashed #ffcc00;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.15);
        }

        h1 {
            font-size: 26px;
            color: #ffffff;
            margin-bottom: 8px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .subtitle {
            font-size: 14px;
            color: #a09cb0;
            margin-bottom: 5px;
        }

        .welcome-user {
            font-size: 13px;
            color: #ffcc00;
            margin-bottom: 0;
            font-weight: bold;
            min-height: 20px;
        }

        /* مشغل الموسيقى */
        .music-player {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 25px 20px;
            margin-bottom: 10px;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        .track-info {
            margin-bottom: 20px;
        }

        .track-title {
            font-size: 18px;
            font-weight: bold;
            color: #ffcc00;
        }

        .track-status {
            font-size: 13px;
            color: #79758f;
            margin-top: 6px;
            transition: color 0.3s;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #25213b;
            border-radius: 3px;
            cursor: pointer;
            margin-bottom: 20px;
            position: relative;
        }

        .progress {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff9900, #ffcc00);
            border-radius: 3px;
            transition: width 0.1s linear;
        }

        .player-controls {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-play {
            background: #ffcc00;
            border: none;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(255, 204, 0, 0.4);
            transition: transform 0.2s, background-color 0.2s;
        }

        .btn-play:hover {
            transform: scale(1.05);
            background: #ffe066;
        }

        .btn-play svg {
            width: 26px;
            height: 26px;
            fill: #000000;
        }

        /* حاوية يوتيوب المخفية بشكل آمن */
        .youtube-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }

        footer {
            margin-top: 30px;
            font-size: 11px;
            color: #4a475a;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="artist-profile">
            <div class="music-icon-container">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="#ffcc00">
                    <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
                </svg>
            </div>
            <h1>Mohamed Habish</h1>
            <p class="subtitle">الفنان محمد حبيش - الصفحة الرسمية</p>
            <p class="welcome-user" id="user-display">جاري الاتصال بـ Pi Network...</p>
        </div>

        <div class="music-player">
            <div class="track-info">
                <p class="track-title">أغنية: اربي كلاب (Arby Klab)</p>
                <p class="track-status" id="player-status">جاري تحميل المشغل...</p>
            </div>
            
            <!-- تم استبدال الـ iframe بـ div مخصص لـ YouTube API -->
            <div class="youtube-hidden">
                <div id="yt-player"></div>
            </div>

            <div class="progress-bar" id="progress-container">
                <div class="progress" id="track-progress"></div>
            </div>
            
            <div class="player-controls">
                <button class="btn-play" id="play-btn" disabled style="opacity: 0.5; cursor: not-allowed;">
                    <svg viewBox="0 0 24 24" id="play-icon"><path d="M8 5v14l11-7z"/></svg>
                </button>
            </div>
        </div>

        <footer>تطبيق ثقافي تعريفي مجاني 100%<br>منظومة وعناصر Pi Network Ecosystem</footer>
    </div>

    <script>
        // --- 1. تهيئة وتكامل Pi Network SDK ---
        const userDisplay = document.getElementById('user-display');
        
        try {
            const Pi = window.Pi;
            if (Pi) {
                Pi.init({ version: "2.0" });
                console.log("Pi SDK Initialized.");
                
                // مصادقة المستخدم والترحيب به تلقائياً داخل متصفح Pi
                Pi.authenticate(['username'], onIncompletePaymentFound)
                  .then(function(auth) {
                      userDisplay.innerText = `مرحباً، Pioneer @${auth.user.username}`;
                  }).catch(function(error) {
                      console.error(error);
                      userDisplay.innerText = "جاهز للمنصة البيئية";
                  });
            } else {
                userDisplay.innerText = "تم التشغيل كصفحة ويب مستقلة";
            }
        } catch (e) {
            console.warn("تنبيه: تشغيل البيئة خارج متصفح Pi Browser.");
            userDisplay.innerText = "تم التشغيل خارج متصفح Pi";
        }

        function onIncompletePaymentFound(payment) {
            // دالة إلزامية من SDK لتهيئة المدفوعات غير المكتملة إن وجدت
            console.log("No incomplete payments found", payment);
        }


        // --- 2. إدارة مشغل YouTube والمزامنة الحقيقية ---
        let player;
        let progressInterval;
        const playBtn = document.getElementById('play-btn');
        const playIcon = document.getElementById('play-icon');
        const playerStatus = document.getElementById('player-status');
        const trackProgress = document.getElementById('track-progress');
        const progressContainer = document.getElementById('progress-container');

        // يتم استدعاء هذه الدالة تلقائياً بواسطة مكتبة يوتيوب الرسمية عند تحميلها
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                height: '1',
                width: '1',
                videoId: 'sctG-RPE61w', // معرف الأغنية الخاصة بك
                playerVars: {
                    'controls': 0,
                    'rel': 0,
                    'playsinline': 1,
                    'enablejsapi': 1
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        // عندما يصبح المشغل جاهزاً للاستخدام
        function onPlayerReady(event) {
            playBtn.disabled = false;
            playBtn.style.opacity = "1";
            playBtn.style.cursor = "pointer";
            playerStatus.innerText = "جاهز للاستماع الفوري";
        }

        // مراقبة حالة المشغل وتحديث الواجهة والتقدم الحقيقي
        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
                playerStatus.innerText = "جاري الاستماع الآن...";
                playerStatus.style.color = "#00e676";
                startProgressTracker();
            } else {
                playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
                if (event.data == YT.PlayerState.PAUSED) {
                    playerStatus.innerText = "تم الإيقاف مؤقتاً";
                    playerStatus.style.color = "#79758f";
                } else if (event.data == YT.PlayerState.ENDED) {
                    playerStatus.innerText = "انتهت الأغنية. أعد التشغيل";
                    playerStatus.style.color = "#ffcc00";
                    trackProgress.style.width = '0%';
                }
                clearInterval(progressInterval);
            }
        }

        // تشغيل وإيقاف الصوت عند الضغط على الزر الرئيسي
        playBtn.addEventListener('click', () => {
            if (player && typeof player.getPlayerState === 'function') {
                const state = player.getPlayerState();
                if (state !== YT.PlayerState.PLAYING) {
                    player.playVideo();
                } else {
                    player.pauseVideo();
                }
            }
        });

        // تتبع الوقت الحقيقي للفيديو ومزامنته مع الشريط
        function startProgressTracker() {
            clearInterval(progressInterval);
            progressInterval = setInterval(() => {
                if (player && typeof player.getCurrentTime === 'function') {
                    const currentTime = player.getCurrentTime();
                    const duration = player.getDuration();
                    if (duration > 0) {
                        const percentage = (currentTime / duration) * 100;
                        trackProgress.style.width = percentage + '%';
                    }
                }
            }, 200); // تحديث كل 200 مللي ثانية للحصول على حركة سلسة جداً
        }

        // تمكين تقديم وتأخير الأغنية عند الضغط على أي مكان في الشريط
        progressContainer.addEventListener('click', (e) => {
            if (player && typeof player.getDuration === 'function') {
                const rect = progressContainer.getBoundingClientRect();
                const clickX = e.clientX - rect.left;
                const width = rect.width;
                const percentage = clickX / width;
                const duration = player.getDuration();
                
                if (duration > 0) {
                    player.seekTo(duration * percentage, true);
                }
            }
        });
    </script>
</body>
</html>
