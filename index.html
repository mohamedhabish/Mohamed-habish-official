<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohamed Habish Official</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: #0b0a12;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: linear-gradient(145deg, #13111c, #1a1829);
            width: 100%;
            max-width: 450px;
            border-radius: 24px;
            padding: 35px 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
        }

        .artist-profile {
            margin-bottom: 30px;
        }

        .music-icon-container {
            width: 90px;
            height: 90px;
            background: rgba(255, 204, 0, 0.1);
            border: 2px dashed #ffcc00;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.15);
        }

        h1 {
            font-size: 26px;
            color: #ffffff;
            margin-bottom: 8px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .subtitle {
            font-size: 14px;
            color: #a09cb0;
            margin-bottom: 0;
        }

        /* مشغل الموسيقى */
        .music-player {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 25px 20px;
            margin-bottom: 10px;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        .track-info {
            margin-bottom: 20px;
        }

        .track-title {
            font-size: 18px;
            font-weight: bold;
            color: #ffcc00;
        }

        .track-status {
            font-size: 13px;
            color: #79758f;
            margin-top: 6px;
            transition: color 0.2s;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #25213b;
            border-radius: 3px;
            cursor: pointer;
            margin-bottom: 20px;
            position: relative;
        }

        .progress {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff9900, #ffcc00);
            border-radius: 3px;
            transition: width 0.1s linear;
        }

        .player-controls {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-play {
            background: #ffcc00;
            border: none;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(255, 204, 0, 0.4);
            transition: transform 0.2s, background-color 0.2s;
        }

        .btn-play:hover {
            transform: scale(1.05);
            background: #ffe066;
        }

        .btn-play svg {
            width: 26px;
            height: 26px;
            fill: #000000;
        }

        footer {
            margin-top: 30px;
            font-size: 11px;
            color: #4a475a;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="artist-profile">
            <div class="music-icon-container">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="#ffcc00">
                    <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
                </svg>
            </div>
            <h1>Mohamed Habish</h1>
            <p class="subtitle">الفنان محمد حبيش - الصفحة الرسمية</p>
        </div>

        <div class="music-player">
            <div class="track-info">
                <p class="track-title">أغنية: اربي كلاب (Arby Klab)</p>
                <p class="track-status" id="player-status">جاهز للاستماع الفوري</p>
            </div>
            
            <!-- عنصر تشغيل الصوت المباشر (يمكنك تغيير الرابط هنا بملف MP3 الخاص بك) -->
            <audio id="audio-player" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" preload="metadata"></audio>

            <div class="progress-bar" id="progress-container">
                <div class="progress" id="track-progress"></div>
            </div>
            
            <div class="player-controls">
                <button class="btn-play" id="play-btn">
                    <svg viewBox="0 0 24 24" id="play-icon"><path d="M8 5v14l11-7z"/></svg>
                </button>
            </div>
        </div>

        <footer>تطبيق ثقافي تعريفي مجاني 100%</footer>
    </div>

    <script>
        const audio = document.getElementById('audio-player');
        const playBtn = document.getElementById('play-btn');
        const playIcon = document.getElementById('play-icon');
        const playerStatus = document.getElementById('player-status');
        const trackProgress = document.getElementById('track-progress');
        const progressContainer = document.getElementById('progress-container');

        // التبديل بين التشغيل والإيقاف المؤقت
        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
            } else {
                audio.pause();
            }
        });

        // الأحداث المرتبطة بحالة التشغيل
        audio.addEventListener('play', () => {
            playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
            playerStatus.innerText = "جاري الاستماع الآن...";
            playerStatus.style.color = "#00e676";
        });

        audio.addEventListener('pause', () => {
            playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
            playerStatus.innerText = "تم الإيقاف مؤقتاً";
            playerStatus.style.color = "#79758f";
        });

        audio.addEventListener('ended', () => {
            playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
            playerStatus.innerText = "انتهت الأغنية. أعد التشغيل";
            playerStatus.style.color = "#ffcc00";
            trackProgress.style.width = '0%';
        });

        // تحديث شريط التقدم تلقائياً مع حركة الصوت الفعلي
        audio.addEventListener('timeupdate', () => {
            const currentTime = audio.currentTime;
            const duration = audio.duration;
            if (duration > 0) {
                const percentage = (currentTime / duration) * 100;
                trackProgress.style.width = percentage + '%';
            }
        });

        // التحكم في تقديم وتأخير الأغنية عند النقر على شريط التقدم
        progressContainer.addEventListener('click', (e) => {
            const rect = progressContainer.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const width = rect.width;
            const percentage = clickX / width;
            const duration = audio.duration;
            
            if (duration > 0) {
                audio.currentTime = duration * percentage;
            }
        });
    </script>
</body>
</html>
