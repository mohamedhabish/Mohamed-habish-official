<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohamed Habish Official</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: #0b0a12;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: linear-gradient(145deg, #13111c, #1a1829);
            width: 100%;
            max-width: 450px;
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
        }

        .artist-profile {
            margin-bottom: 35px;
        }

        .music-icon-container {
            width: 90px;
            height: 90px;
            background: rgba(255, 204, 0, 0.1);
            border: 2px dashed #ffcc00;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.15);
        }

        h1 {
            font-size: 26px;
            color: #ffffff;
            margin-bottom: 8px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .subtitle {
            font-size: 14px;
            color: #a09cb0;
        }

        /* حيز عرض العمل الفني والزر */
        .track-section {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 30px 20px;
            margin-bottom: 10px;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        .track-title {
            font-size: 18px;
            font-weight: bold;
            color: #ffcc00;
            margin-bottom: 25px;
        }

        /* زر التوجيه إلى يوتيوب */
        .btn-youtube {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #ff0000; /* لون يوتيوب الرسمي */
            color: #ffffff;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 5px 15px rgba(255, 0, 0, 0.3);
            transition: transform 0.2s, background-color 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        .btn-youtube:hover {
            transform: scale(1.02);
            background: #e60000;
            box-shadow: 0 7px 20px rgba(255, 0, 0, 0.4);
        }

        .btn-youtube svg {
            width: 22px;
            height: 22px;
            fill: #ffffff;
        }

        footer {
            margin-top: 35px;
            font-size: 11px;
            color: #4a475a;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="artist-profile">
            <div class="music-icon-container">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="#ffcc00">
                    <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
                </svg>
            </div>
            <h1>Mohamed Habish</h1>
            <p class="subtitle">الفنان محمد حبيش - الصفحة الرسمية</p>
        </div>

        <div class="track-section">
            <p class="track-title">أغنية: اربي كلاب (Arby Klab)</p>
            
            <!-- زر الانتقال المباشر إلى رابط الأغنية المذكور -->
            <a href="https://youtu.be/sctG-RPE61w?si=yWI-Q_cVvZh8JLHT" target="_blank" class="btn-youtube">
                <svg viewBox="0 0 24 24">
                    <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
                </svg>
                اضغط هنا للاستماع عبر يوتيوب
            </a>
        </div>

        <footer>تطبيق ثقافي تعريفي مجاني 100%</footer>
    </div>

</body>
</html>
